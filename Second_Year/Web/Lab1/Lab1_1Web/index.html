<html lang="ru">
<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="/css/styles.css">

<body>
  <table class="header" width="100%">
  <tr>
    <td align="center">
      <h1>Федоров Дмитрий Александрович</h1>
      <p>P3206</p>
      <p>Вариант: 467846</p>
    </td>
  </tr>
</table>
  
  <table id="toast-container">
    <tbody></tbody>
  </table>
  

<form id="input-form" align="center">
  
  <table class="input_table" border="2" cellpadding="5">
    <tr>
      <td colspan="2" align="center" >
        <h1>Форма для ввода</h1>
      </td>
    </tr>
    
    
    <tr>
      <td><label for="change_x">X:</label></td>
      <td>
      <label><input type="checkbox" name="x" value="-2"> -2</label>
      <label><input type="checkbox" name="x" value="-1.5"> -1.5</label>
      <label><input type="checkbox" name="x" value="-1"> -1</label>
      <label><input type="checkbox" name="x" value="-0.5"> -0.5</label>
      <label><input type="checkbox" name="x" value="0"> 0</label>
      <label><input type="checkbox" name="x" value="0.5"> 0.5</label>
      <label><input type="checkbox" name="x" value="1"> 1</label>
      <label><input type="checkbox" name="x" value="1.5"> 1.5</label>
      <label><input type="checkbox" name="x" value="2"> 2</label>
    </td>
    </tr>
    <tr>
      <td><label for="change_y">Y:</label></td>
      <td><input type="text" id="change_y" name="change_y" placeholder= "от -5 до 5"></td>
    </tr>
    <tr>
    <td><label for="r">R:</label></td>
      <td>
      <button type="button" class="r-btn" data-value="1">1</button>
      <button type="button" class="r-btn" data-value="1.5">1.5</button>
      <button type="button" class="r-btn" data-value="2">2</button>
      <button type="button" class="r-btn" data-value="2.5">2.5</button>
      <button type="button" class="r-btn" data-value="3">3</button>
      </td>  
    </tr>
    <tr>
      <td colspan="2" align="center">
        <input type="submit" value="Отправить">
      </td>
    </tr>
  </table>
  
</form>

        <path d="M200,200 L275,200 A75,75 0 0,1 200,275" fill="lightblue"/>
        <polygon points="200,200 125,200 200,275" fill="lightblue"/>
 
  
      <!-- ось X -->

        <line x1="392" y1="192" x2="400" y2="200" stroke="black"/>
        <line x1="392" y1="208" x2="400" y2="200" stroke="black"/>
        <text x="395" y="192" font-size="12">x</text>
      <!-- ось Y -->
      <line x1="200" y1="0" x2="200" y2="400" stroke="black" stroke-width="2"/>

        <line x1="195" y1="350" x2="205" y2="350" stroke="black"/>
        <text x="208" y="353" font-size="12">-R</text>
        
        <line x1="200" y1="0" x2="192" y2="8" stroke="black"/>
        <line x1="200" y1="0" x2="208" y2="8" stroke="black"/>

       </svg>
  </td>
</tr>
</table>
