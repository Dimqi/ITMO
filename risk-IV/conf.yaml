limit: 1000
memory_size: 0x2000
memory_mapped_io:
  0x80: [65, 66, 67, 68, 10]
  0x84: []

reports:
  - name: Step-by-step
    slice: all
    view: |
      {pc}:	{instruction}	{pc:label}
  - name: Result
    slice: last
    view: |
      numio[0x80]: {io:0x80:dec}
      numio[0x84]: {io:0x84:dec}
      symio[0x80]: {io:0x80:sym}
      symio[0x84]: {io:0x84:sym}
    assert: |
      numio[0x80]: [] >>> []
      numio[0x84]: [] >>> [87,104,97,116,32,105,115,32,121,111,117,114,32,110,97,109,101,63,10,72,101,108,108,111,44,32,65,66,67,68,33]
      symio[0x80]: "" >>> ""
      symio[0x84]: "" >>> "What is your name?\nHello, ABCD!"